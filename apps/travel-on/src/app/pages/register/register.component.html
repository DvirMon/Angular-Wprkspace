<div class="register-page-wrapper">
  <img
    ngSrc="../../../assets/images/backgrounds/register_2.jpeg"
    height="475"
    width="400"
    alt=""
  />
  <div class="register-wrapper">
    <to-register-form
      (register)="onRegister($event)"
      [serverError]="serverError()"
    ></to-register-form>
    <dom-card-button
      routerLink="/"
      label="Have an account?"
      boldLabel="Log in"
    ></dom-card-button>
  </div>
</div>
